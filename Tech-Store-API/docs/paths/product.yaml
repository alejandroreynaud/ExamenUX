post:
  summary: Crear nuevo producto
  tags: [ Product ]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            nombre:
              type: string
              example: "Memoria RAM"
            activo:
              type: boolean
              example: true
  responses:
    '201':
      description: Creado con éxito
get:
  summary: Listar productos
  tags: [ Product ]
  responses:
    '200':
      description: Productos encontrados
      content:
        application/json:
          example:
            - id: 1
              nombre: "Cloro"
              activo: true
            - id: 2
              nombre: "Jabon"
              activo: true
